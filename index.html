<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rushil Singh — Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --ink: #1a1714;
      --ink-muted: #6b6560;
      --ink-faint: #b8b2ab;
      --accent: #c84b2f;
      --border: #ddd8d0;
      --mono: 'DM Mono', monospace;
      --serif: 'DM Serif Display', serif;
      --sans: 'DM Sans', sans-serif;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }

    /* Header */
    header {
      margin-bottom: 72px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }

    .label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 300;
      color: var(--ink-muted);
      max-width: 480px;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 48px 0;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.15s forwards;
    }

    /* Sections */
    section {
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(12px);
    }

    section:nth-child(1) { animation: fadeUp 0.7s ease 0.2s forwards; }
    section:nth-child(2) { animation: fadeUp 0.7s ease 0.3s forwards; }
    section:nth-child(3) { animation: fadeUp 0.7s ease 0.4s forwards; }
    section:nth-child(4) { animation: fadeUp 0.7s ease 0.5s forwards; }
    section:nth-child(5) { animation: fadeUp 0.7s ease 0.6s forwards; }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 20px;
    }

    /* About */
    .about p {
      font-size: 16px;
      color: var(--ink);
      line-height: 1.75;
      font-weight: 300;
    }

    .about p + p { margin-top: 12px; }

    /* Experience */
    .role {
      padding: 20px 0;
      border-top: 1px solid var(--border);
    }

    .role:last-child { border-bottom: 1px solid var(--border); }

    .role-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .role-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
    }

    .role-company {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 400;
    }

    .role-period {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .role-desc {
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.65;
      font-weight: 300;
    }

    /* Skills */
    .skill-groups {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 500px) {
      .skill-groups { grid-template-columns: 1fr; }
    }

    .skill-group-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 8px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-muted);
      background: rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tag:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
    }

    /* Links */
    .links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--ink-muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      position: relative;
    }

    .link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .link:hover { color: var(--ink); }
    .link:hover::after { width: 100%; }

    .link-arrow {
      font-size: 10px;
      opacity: 0.5;
      transition: transform 0.2s, opacity 0.2s;
    }

    .link:hover .link-arrow {
      transform: translate(2px, -2px);
      opacity: 1;
    }

    /* Footer */
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.7s forwards;
    }

    .footer-note {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
    }

    .footer-note span {
      color: var(--accent);
    }

    /* Animations */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .container { padding: 48px 24px 80px; }
      h1 { font-size: 3rem; }
      .role-header { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>

    <header>
      <div class="label">rushilsingh.dev</div>
      <h1>Rushil<br />Singh</h1>
      <p class="tagline">Software engineer. Backend systems and applied AI.</p>
    </header>

    <div class="divider"></div>

    <section>
      <div class="section-label">Contact</div>
      <div class="links">
        <a class="link" href="https://www.linkedin.com/in/rushilsingh/" target="_blank" rel="noopener">
          LinkedIn <span class="link-arrow">↗</span>
        </a>
      </div>
    </section>

    <footer>
      <div
